name: Pricing sync

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Serialize runs: this job commits + pushes to main, so two overlapping runs
# (e.g. a manual dispatch during the Monday cron) must not race the push.
# cancel-in-progress: false — never interrupt an in-flight commit/push; queue.
concurrency:
  group: pricing-sync
  cancel-in-progress: false

permissions:
  # Direct-commits the synced data to main; no PR is opened, so contents:write
  # is the only scope needed.
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install project
        # dev extra so the in-job validation gate (ruff/mypy/pytest) has its
        # dependencies; the refresh fetch uses only urllib, so no measure extra.
        run: uv sync --extra dev --frozen

      - name: Refresh curated seed prices
        # The shipped src/frugon/data/pricing.json is a small CURATED canonical
        # seed (offline fallback). The full LiteLLM registry is fetched into the
        # user data dir at runtime by `frugon pricing update`; it must NOT be
        # dumped into source (bloat + non-canonical keys). refresh_seed_prices
        # only refreshes the cost values of the seed's EXISTING keys via exact
        # registry match — it never adds or removes models.
        run: |
          uv run python - <<'EOF'
          from datetime import date
          from pathlib import Path

          from frugon.pricing import (
              PricingUpdateError,
              refresh_seed_prices,
              _LITELLM_REGISTRY_URL,
          )

          # Classify the failure so the unattended cron log distinguishes a
          # transient upstream blip (re-runs fine next week) from a structural
          # break (registry moved / host changed — needs a human).
          try:
              result = refresh_seed_prices(
                  _LITELLM_REGISTRY_URL,
                  Path("src/frugon/data/pricing.json"),
                  date.today().isoformat(),
              )
          except PricingUpdateError as exc:
              print(f"::warning::pricing refresh fetch/parse failed (likely transient): {exc}")
              raise
          except ValueError as exc:
              print(f"::error::registry URL/host validation failed — upstream may have moved: {exc}")
              raise
          print(f"Checked {result['checked']} seed models; refreshed {result['updated']} price(s)")
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/frugon/data/pricing.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate pricing data (in-job gate)
        # Pricing commits straight to main (no PR), so this in-job gate is the
        # sole correctness check before it lands: lint + type-check + the
        # pricing, pricing-update, cost-math, and id-drift tests.  These verify
        # the fetched data loads, applies correctly through the cost math, and
        # normalises model IDs — the data classes that actually affect output.
        # ci.yml's cross-OS matrix does NOT run on the resulting commit (a
        # GITHUB_TOKEN push does not trigger workflows) — acceptable for a
        # data-only JSON refresh.  --no-cov: targeted subset, global gate N/A.
        if: steps.diff.outputs.changed == 'true'
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest tests/test_pricing.py tests/test_pricing_update.py tests/test_cost.py tests/test_model_id_drift.py -q --no-cov

      - name: Commit refreshed seed prices directly to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frugon/data/pricing.json
          git commit \
            -m "chore(pricing): refresh curated seed prices" \
            -m "Automated weekly price refresh of the existing curated models in src/frugon/data/pricing.json from the LiteLLM registry. Existing keys only — no models added or removed."
          # Bounded retry: a transient blip (or a rare race the concurrency guard
          # didn't cover) self-heals by refetching main and replaying the commit.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Committed refreshed seed prices directly to main (attempt $attempt)." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "push attempt $attempt failed; refetching main and retrying" >&2
            git fetch origin main && git rebase origin/main || git rebase --abort || true
            sleep 5
          done
          echo "::error::pricing seed-price refresh push failed after 3 attempts" >&2
          exit 1

      - name: No changes — nothing to commit
        if: steps.diff.outputs.changed == 'false'
        run: echo "Seed prices already current — no models added/removed, nothing to commit." >> "$GITHUB_STEP_SUMMARY"
