name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Workflow-level write access for the release job to create GitHub Releases.
# The publish job overrides with id-token: write only (Trusted Publishing).
permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pushing a release tag runs THIS workflow and ci.yml concurrently
          # against the same commit. Both setup-uv steps otherwise share the
          # default cache key, so whichever job's cache-save loses the race
          # logs a spurious "Failed to save: Unable to reserve cache" on
          # every release. A distinct suffix per job (test vs build below)
          # gives each its own cache entry so neither depends on winning a
          # race against the other jobs' setup-uv steps.
          cache-suffix: "release-test"

      - name: Install project with dev dependencies
        run: uv sync --extra dev --extra measure --frozen

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Type-check — mypy
        run: uv run mypy src

      - name: Test — pytest
        run: uv run pytest

      - name: Test — strict cost coverage
        run: uv run pytest --cov-config=.coveragerc-strict --cov-fail-under=90

  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # See the "test" job's setup-uv step above: a distinct suffix per
          # job avoids the cache-save race between this workflow's own jobs
          # and the concurrently-triggered ci.yml run on the same tag push.
          cache-suffix: "release-publish"

      # Align the package version with the pushed git tag so the published
      # wheel/sdist matches the release. Strips a leading "v" from the tag
      # (v1.2.3 -> 1.2.3) and rewrites the version line in pyproject.toml.
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting pyproject version to ${VERSION} (from tag ${GITHUB_REF_NAME})"
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      - name: Build
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing — no API token used

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  release-notes:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository (for the curated release-notes file)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      # Prefer the curated, hand-written notes at .github/RELEASE_NOTES_<tag>.md
      # (e.g. .github/RELEASE_NOTES_v0.1.0.md) when present; otherwise fall back to
      # auto-generated notes. body_path="" is treated as unset by action-gh-release.
      - name: Resolve curated release notes (per-tag, optional)
        id: notes
        run: |
          NOTES=".github/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            echo "Using curated notes: $NOTES"
            echo "path=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No curated notes at $NOTES — falling back to auto-generated notes."
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
