name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0: bump by verifying refs/tags/vX.y.z before changing.
        with:
          enable-cache: true
          python-version: "${{ matrix.python-version }}"

      - name: Install project with dev dependencies
        run: uv sync --extra dev --extra measure --frozen

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Type-check — mypy
        run: uv run mypy src

      - name: Test — pytest
        run: uv run pytest

      - name: Test — strict cost coverage
        run: uv run pytest --cov-config=.coveragerc-strict --cov-fail-under=90
