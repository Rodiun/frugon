name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least-privilege default: this workflow only checks out the repo and runs
# lint/type-check/tests — it never pushes, comments, or opens a PR, so
# read-only access to repo contents is all it needs.  Every other workflow in
# this repo (release.yml, pricing-sync.yml, quality-sync.yml) already declares
# an explicit permissions block; this closes the one remaining gap.
permissions:
  contents: read

jobs:
  attribution:
    name: "Commit attribution"
    runs-on: ubuntu-latest
    # Backstop for the .githooks/pre-push check, which only runs in clones that
    # have set core.hooksPath. On a pull_request this gates the merge. On a push
    # to main it is DETECTION, not prevention: history here is linear and pushed
    # directly, so by the time this runs the commits are already public and the
    # job can only turn them red. That is still the difference between noticing
    # in minutes and noticing weeks later in the GitHub UI.
    #
    # Skipped on a force-push: rewriting history means github.event.before is no
    # longer an ancestor of .after, so the range will not resolve and the guard
    # fails closed (by design). Without this, a push that rewrites history to
    # REMOVE a bad trailer would be failed by the very check that asked for it.
    if: github.event.forced != true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The check walks a commit range, so it needs the history, not a
          # single-commit shallow checkout.
          fetch-depth: 0

      - name: Check commit attribution
        env:
          RANGE: >-
            ${{ github.event_name == 'pull_request'
                && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha)
                || format('{0}..{1}', github.event.before, github.event.after) }}
        run: ./scripts/check-commit-attribution.sh "$RANGE"

  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0: bump by verifying refs/tags/vX.y.z before changing.
        with:
          enable-cache: true
          python-version: "${{ matrix.python-version }}"

      - name: Install project with dev dependencies
        run: uv sync --extra dev --extra measure --frozen

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Type-check — mypy
        run: uv run mypy src

      - name: Test — pytest
        run: uv run pytest

      - name: Test — strict cost coverage
        run: uv run pytest --cov-config=.coveragerc-strict --cov-fail-under=90
